name: Bug Report
description: Report a bug or unexpected behavior
labels: [ "bug" ]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: SQL statements or steps to reproduce the behavior.
      placeholder: |
        1. CREATE EXTENSION pg_grpc;
        2. SELECT grpc_call(...);
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include the full error message if applicable.
    validations:
      required: true

  - type: input
    id: pg_grpc-version
    attributes:
      label: pg_grpc Version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: pg-version
    attributes:
      label: PostgreSQL Version
      placeholder: "18.3"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: "Output of `rustc --version`."
      placeholder: "rustc 1.82.0 (f6e511eec 2024-10-15)"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 15 / etc."
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install Method
      options:
        - Built from source (cargo pgrx install)
        - .deb package from a release
        - Other
    validations:
      required: false
