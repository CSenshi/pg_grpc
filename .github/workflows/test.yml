name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang libclang-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-pgrx binary
        id: cache-cargo-pgrx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-0.17.0-${{ runner.os }}-amd64

      - name: Install cargo-pgrx
        if: steps.cache-cargo-pgrx.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Init pgrx
        run: cargo pgrx init --pg18

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --no-default-features --features pg18 -- -D warnings

  test:
    name: test (pg13-18)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-pgrx binary
        id: cache-cargo-pgrx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-0.17.0-${{ runner.os }}-amd64

      - name: Install cargo-pgrx
        if: steps.cache-cargo-pgrx.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Init pgrx
        run: cargo pgrx init

      - name: Run tests
        run: cargo pgrx test all
