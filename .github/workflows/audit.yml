name: Audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
